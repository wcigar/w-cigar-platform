<style>
  :root{
    --bg:#0a0a0a; --panel:#111111; --gold:#d0a54f; --text:#e8e5df;
    --muted:#a39d91; --danger:#e45d5d; --success:#3db27d; --warning:#f0b14a;
    --shadow:0 18px 40px rgba(0,0,0,.45); --radius:24px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:"Noto Sans TC",system-ui,sans-serif; overflow-x:hidden; font-size:16px; }
  
  /* 隱私模式遮罩 */
  .privacy-hidden .money-value { filter: blur(6px); pointer-events: none; user-select: none; opacity: 0.7; transition: 0.3s ease; }

  /* 隱藏 */
  .hidden { display: none !important; }

  .page-shell{ min-height:100vh; display:flex; flex-direction:column; background: radial-gradient(circle at top right, rgba(208,165,79,.08), transparent 30%); }
  .topbar{ position:sticky; top:0; z-index:100; backdrop-filter:blur(15px); background:rgba(10,10,10,.85); border-bottom:1px solid rgba(208,165,79,.15); }
  .topbar-inner{ width:min(1280px, calc(100% - 32px)); margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:80px; }
  
  .brand{ cursor:pointer; user-select:none; }
  .brand h1{ margin:0; font-size:26px; letter-spacing:.2em; color:var(--gold); font-family:"Times New Roman", serif; font-weight:700; }
  .brand small{ display:block; color:#7f7768; letter-spacing:.25em; font-size:12px; margin-top:2px; }

  .content-wrap{ width:min(1280px, calc(100% - 32px)); margin:0 auto; padding:24px 0 100px; flex:1; }
  .view-card{ background:linear-gradient(180deg, rgba(21,21,21,.94), rgba(15,15,15,.96)); border:1px solid rgba(208,165,79,.12); border-radius:var(--radius); box-shadow:var(--shadow); }
  .home-wrap{ min-height:calc(100vh - 220px); display:grid; place-items:center; padding:16px 0; }
  .login-card{ width:min(100%, 500px); padding:34px 28px; }
  .login-mark{ width:80px; height:80px; border-radius:999px; margin:0 auto 20px; display:grid; place-items:center; background:linear-gradient(135deg, #c18f33, #4f2f07); box-shadow:0 16px 30px rgba(104,64,11,.25); font-size:32px; }
  .center{text-align:center;}
  .home-title{ font-family:"Times New Roman", serif; color:var(--gold); font-size:36px; letter-spacing:.18em; margin:0 0 10px; font-weight:bold;}
  .subtle{ color:var(--muted); font-size:16px; line-height:1.7; }

  .field-stack{ display:flex; flex-direction:column; gap:14px; }
  .field{ margin-top:20px; }
  .field label{ display:block; margin-bottom:10px; font-size:15px; color:#c5bea2; font-weight:bold;}
  .input{ width:100%; border-radius:16px; border:1px solid #333; background:#0c0c0c; color:var(--text); padding:16px 18px; outline:none; transition:.18s ease; font-size:18px;}
  .input:focus{ border-color:rgba(208,165,79,.6); box-shadow:0 0 0 4px rgba(208,165,79,.15); }
  .input.center-xl{ text-align:center; font-size:40px; letter-spacing:.22em; padding:20px 16px; color:var(--gold); font-weight:300; }
  
  .primary-btn, .secondary-btn, .danger-btn{ border:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:16px; padding:16px 20px; font-weight:700; transition:.2s; font-size:18px;}
  .primary-btn{ width:100%; color:#fff; background:linear-gradient(90deg, #936117, #5e3910); }
  .primary-btn:hover{ filter:brightness(1.1); transform:translateY(-2px); }
  .primary-btn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; filter:none; }
  .secondary-btn{ background:#191919; color:#ddd7ce; border:1px solid #333; width:100%; }
  .secondary-btn:hover{ border-color:rgba(208,165,79,.4); color:var(--gold); }
  .danger-btn{ width:100%; color:#fff; background:linear-gradient(90deg, #c43a3a, #8b1c1c); }
  .danger-btn:hover{ filter:brightness(1.1); transform:translateY(-2px); }
  .btn-sm{ padding:12px 16px; border-radius:14px; font-size:15px; width:auto; }
  .btn-xs{ padding:10px 14px; border-radius:12px; font-size:14px; width:auto; }
  .top-gap{ margin-top:16px; }
  
  .icon-btn{ width:48px; height:48px; border-radius:14px; background:#151515; border:1px solid #2a2a2a; color:#9b9388; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:.2s ease; font-size:20px;}
  .icon-btn:hover{ color:var(--gold); border-color:rgba(208,165,79,.4); background:#18120a; }

  .operator-badge{ background:rgba(208,165,79,.1); border:1px solid rgba(208,165,79,.25); color:var(--gold); padding:8px 14px; border-radius:12px; }

  /* 全域訊息框 */
  .success-box{ background:rgba(61,178,125,.12); border:1px solid rgba(61,178,125,.35); color:var(--success); border-radius:16px; padding:16px 20px; font-size:16px; line-height:1.5; }
  .error-box{ background:rgba(228,93,93,.12); border:1px solid rgba(228,93,93,.35); color:var(--danger); border-radius:16px; padding:16px 20px; font-size:16px; line-height:1.5; }

  /* 頂部看板 */
  .hero-card{ background:linear-gradient(135deg, #161616, #0d0d0d); border:1px solid rgba(208,165,79,.25); border-radius:var(--radius); padding:32px; margin-bottom:24px; box-shadow:var(--shadow); position:relative; }
  .hero-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
  .vip-name{ font-size:38px; font-family:"Times New Roman", serif; color:var(--gold); margin:0; font-weight:bold;}
  .hero-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:16px; }
  .metric-box{ background:rgba(255,255,255,0.03); padding:20px 16px; border-radius:18px; border:1px solid rgba(255,255,255,0.06); text-align:right; }
  .metric-label{ display:block; font-size:13px; color:var(--muted); margin-bottom:8px; letter-spacing:1px; }
  .metric-value{ font-size:26px; font-weight:700; font-family:"Times New Roman", serif; }
  .metric-value.gold{ color:var(--gold); }
  .metric-value.success{ color:var(--success); }
  .metric-value.danger{ color:var(--danger); }

  /* 醇化標籤 */
  .aging-tag{ font-size:12px; padding:6px 10px; border-radius:8px; font-weight:bold; margin-left:10px; display:inline-block; vertical-align:middle;}
  .tag-new{ background:rgba(240,177,74,.15); color:var(--warning); border:1px solid rgba(240,177,74,.2); }
  .tag-ready{ background:rgba(61,178,125,.15); color:var(--success); border:1px solid rgba(61,178,125,.2); }
  .tag-perfect{ background:rgba(208,165,79,.2); color:var(--gold); border:1px solid var(--gold); }

  /* 雙頁籤與視角切換 */
  .tab-container{ display:flex; gap:10px; margin-bottom:20px; background:#141414; padding:8px; border-radius:20px; width:fit-content; border:1px solid #252525; flex-wrap:wrap;}
  .tab-btn{ padding:14px 24px; border-radius:16px; border:none; background:transparent; color:#888; font-weight:700; cursor:pointer; transition:.3s; font-size:16px; }
  .tab-btn.active{ background:rgba(208,165,79,.15); color:var(--gold); }
  
  .view-toggle-container { margin-bottom:20px; display:flex; gap:12px; }
  .view-toggle-btn { padding:14px 20px; border-radius:14px; background:#1a1a1a; border:1px solid #333; color:#aaa; font-size:16px; font-weight:bold; cursor:pointer; transition:.2s; flex:1; text-align:center;}
  .view-toggle-btn.active { background:linear-gradient(135deg, #c18f33, #6a4411); color:#fff; border-color:var(--gold); }

  /* 櫃位/品牌 卡片 */
  .cabinet-block{ background:#111; border-radius:var(--radius); border:1px solid #2a2a2a; margin-bottom:24px; overflow:hidden; }
  .cabinet-head{ padding:24px; background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2a2a2a; flex-wrap:wrap; gap:12px;}
  .cabinet-title{ margin:0; font-size:22px; color:var(--gold); font-family:"Times New Roman", serif; font-weight:bold;}
  .cabinet-price-badge{ background:rgba(208,165,79,.1); color:var(--gold); padding:8px 16px; border-radius:12px; font-size:15px; font-weight:bold; border:1px solid rgba(208,165,79,.2); }
  
  .cigar-row{ padding:24px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1f1f1f; gap:20px; flex-wrap:wrap;}
  .cigar-row:last-child{ border-bottom:none; }
  .cigar-info{ flex:1; min-width:250px; }
  .cigar-name{ font-size:20px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; flex-wrap:wrap; gap:10px; line-height:1.4;}
  .cigar-meta{ font-size:15px; color:var(--muted); margin-bottom:14px;}
  .cigar-qty{ text-align:right; min-width:100px; }
  .qty-num{ font-size:36px; font-weight:300; display:block; color:#fff;}
  .qty-label{ font-size:13px; color:#777; font-weight:bold; margin-top:4px; display:block;}

  /* 低庫存警示樣式 */
  .low-stock-row { background: rgba(228, 93, 93, 0.05); }
  .low-stock-text { color: var(--danger); font-size: 14px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .restock-btn { color: #fff; background: linear-gradient(90deg, #c43a3a, #8b1c1c); border: none; box-shadow: 0 4px 15px rgba(228,93,93,0.3); }
  .restock-btn:hover { filter: brightness(1.2); }

  /* 功能按鈕 */
  .action-btn{ padding:14px 20px; border-radius:14px; border:1px solid #444; background:#1a1a1a; color:var(--gold); cursor:pointer; font-size:15px; font-weight:bold; transition:.2s; }
  .action-btn:hover{ background:var(--gold); color:#000; }
  .concierge-btn{ color:#3db27d; border-color:rgba(61,178,125,.4); }

  /* 歷史軌跡與財務卡片 */
  .history-list{ display:flex; flex-direction:column; gap:16px; padding:20px; }
  .history-card{ border:1px solid #333; background:#151515; border-radius:20px; padding:20px; }
  .history-top{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .history-time{ color:var(--gold); font-size:15px; font-weight:700; }
  .badge{ border-radius:999px; padding:8px 14px; font-size:14px; font-weight:bold; border:1px solid #444; background:#131313; color:#ddd; }
  .badge.gold{ background:rgba(208,165,79,.15); color:var(--gold); border-color:rgba(208,165,79,.3); }
  .badge.success{ background:rgba(61,178,125,.15); color:var(--success); border-color:rgba(61,178,125,.3); }
  .badge.danger{ background:rgba(228,93,93,.15); color:var(--danger); border-color:rgba(228,93,93,.3); }
  .history-title{ font-size:18px; font-weight:bold; color:#fff; margin-bottom:16px;}
  .history-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(100px, 1fr)); gap:12px; margin-bottom:16px;}
  .history-grid div{ border-radius:14px; background:#1a1a1a; border:1px solid #2a2a2a; padding:12px; text-align:center;}
  .history-grid span{ display:block; color:#8f877b; font-size:13px; margin-bottom:6px; }
  .history-grid strong{ color:#fff; font-size:16px; font-weight:700; }

  /* 簽名彈窗 */
  .modal-overlay{ position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.9); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:.3s; }
  .modal-overlay.active{ opacity:1; pointer-events:auto; }
  .modal-card{ width:min(100%, 500px); background:#111; border:1px solid var(--gold); border-radius:var(--radius); padding:32px; max-height:90vh; overflow-y:auto; }
  
  .segment-control{ display:flex; gap:12px; margin:20px 0; flex-wrap:wrap;}
  .segment-item{ flex:1; min-width:100px; padding:16px; border-radius:14px; background:#1a1a1a; border:1px solid #444; text-align:center; color:#888; cursor:pointer; font-weight:bold; font-size:16px; transition:.2s;}
  .segment-item.active{ background:rgba(208,165,79,.15); border-color:var(--gold); color:var(--gold); }

  .canvas-wrap{ background:#eee; border-radius:16px; margin:14px 0; touch-action:none; border:2px solid #333;}
  canvas{ width:100%; height:200px; display:block; cursor:crosshair;}

  /* 拍照按鈕與預覽 */
  .camera-btn-wrapper{ position:relative; overflow:hidden; }
  .camera-btn-wrapper input[type="file"]{ position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
  .photo-preview{ max-width:100%; max-height:300px; border-radius:16px; border:1px solid #333; display:none; }
  .signature-img{ max-height:80px; background:#fff; padding:2px; border-radius:10px; }

  /* 後台管理面板 */
  .section-head{ margin-bottom:24px; }
  .section-head h2{ color:var(--gold); font-size:30px; font-family:"Times New Roman", serif; margin:0 0 6px; }
  .section-head p{ color:var(--muted); font-size:15px; margin:0; }

  .admin-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(360px, 1fr)); gap:24px; }
  .admin-card{ padding:28px; }
  .admin-card.full-span{ grid-column: 1 / -1; }
  .panel-head{ margin-bottom:20px; }
  .panel-head h3{ margin:0 0 4px; font-size:20px; color:var(--gold); }
  .panel-head .subtle{ font-size:14px; }

  .info-table{ display:flex; flex-direction:column; gap:2px; }
  .info-row{ display:flex; justify-content:space-between; align-items:center; padding:14px 16px; background:rgba(255,255,255,.02); border-radius:12px; gap:12px; }
  .info-row.column{ flex-direction:column; align-items:flex-start; }
  .info-row span{ color:var(--muted); font-size:14px; flex-shrink:0; }
  .info-row strong{ color:#fff; font-size:14px; word-break:break-all; text-align:right; }
  .info-row .mono{ font-family:monospace; font-size:13px; color:#aaa; }
  .link-wrap{ width:100%; margin-top:8px; }
  .link-wrap a{ color:var(--gold); word-break:break-all; font-size:14px; }

  .tip-box{ background:rgba(208,165,79,.06); border:1px solid rgba(208,165,79,.15); border-radius:14px; padding:16px; color:var(--muted); font-size:14px; line-height:1.6; }
  .admin-actions{ display:flex; gap:12px; flex-wrap:wrap; }

  .empty-card{ text-align:center; padding:40px 20px; color:#666; font-size:18px; }

  @media (max-width: 600px) {
    .hero-grid{ grid-template-columns: 1fr 1fr; }
    .metric-box{ padding:16px; }
    .vip-name{ font-size:32px; }
    .input.center-xl{ font-size:32px; }
    .qty-num{ font-size:32px; }
    .view-toggle-btn { padding:12px; font-size:15px; }
    .admin-grid{ grid-template-columns:1fr; }
  }
</style>
